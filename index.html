<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jo Ha-yul Portfolio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a href="index.html" class="logo">Ha-yul Portfolio</a>
        <nav class="topnav">
          <a href="index.html" class="active">Home</a>
          <a href="about.html">About</a>
          <a href="library.html">Library</a>
        </nav>
      </div>
    </header>

    <main class="home-main">
      <section class="hero portfolio-hero">
        <div>
          <p class="hero-badge">Information Security Student</p>
          <h1>정보보호를 공부하며 성장하는 포트폴리오</h1>
          <p class="hero-text">
            웹 개발, 리눅스, 네트워크 등 보안 기초 학습 과정과 
            직접 구현한 프로젝트들을 기록하는 공간입니다.
          </p>
        </div>
      </section>

      <section class="home-cards">
        <a href="about.html" class="home-card">
          <h2>About Me</h2>
          <p>관심 분야, 핵심 기술 스택, 뚜렷한 성장 목표를 담은 개인 소개 페이지</p>
        </a>

        <a href="library.html" class="home-card">
          <h2>Project Library</h2>
          <p>그동안 공부하며 쌓아온 개인 토이 프로젝트 및 팀 프로젝트 아카이브</p>
        </a>
      </section>
      
    </main>
    <button id="scrollTopBtn" title="맨 위로 이동">↑</button>
    <section class="content-section card-section audio-controller-card" style="max-width: 400px; margin: 30px auto; text-align: center;">
  <div class="audio-info">
    <i class="fas fa-music" style="color: #38bdf8; font-size: 1.5rem; margin-bottom: 10px;"></i>
    <h3 style="margin: 5px 0; font-size: 1.1rem;">BGM Controller</h3>
    <p id="music-status-text" style="color: #94a3b8; font-size: 0.85rem; margin-bottom: 15px;">클릭하여 재생</p>
  </div>

  <div class="audio-controls" style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
    <button id="btn-toggle-play" style="background: #1e293b; border: 1px solid #334155; color: #38bdf8; width: 50px; height: 50px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;">
      ▶
    </button>

    <div style="display: flex; align-items: center; gap: 10px; width: 100%; max-width: 250px;">
      <span style="font-size: 0.9rem; color: #94a3b8;">🔈</span>
      <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5" style="flex: 1; accent-color: #38bdf8; cursor: pointer;" />
      <span style="font-size: 0.9rem; color: #94a3b8;">🔊</span>
    </div>
  </div>
</section>

<audio id="bgm-audio" src="Soundtrack_Break_Away.mp3" loop></audio>
    <script src="script.js"></script>
  </body>
</html>
